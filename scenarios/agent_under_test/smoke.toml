# Quick local smoke scenario for the baseline LiteLLM agent under test.

[evaluator]
endpoint = "http://127.0.0.1:8081"
cmd = "python src/evaluator/server.py --host 127.0.0.1 --port 8081"

[agent_under_test]
endpoint = "http://127.0.0.1:8080"
cmd = "python src/agent_under_test/server.py --host 127.0.0.1 --port 8080 --agent-llm gemini/gemini-2.5-flash --temperature 0.0"

[config]
num_trials = 1
task_split = "test"
tasks_base_num_tasks = 3
tasks_hallucination_num_tasks = 0
tasks_disambiguation_num_tasks = 0
