# Local Docker full public test-set scenario for my_agent.
# Generate with:
#   uv run python generate_compose.py --scenario scenarios/my_agent/local_docker_test_set.toml

[evaluator]
image = "ghcr.io/car-bench/car-bench-evaluator:latest"
env = { GEMINI_API_KEY = "${GEMINI_API_KEY:?Set GEMINI_API_KEY in .env}", LOGURU_LEVEL = "${LOGURU_LEVEL:-INFO}" }

[agent_under_test]
build = { context = ".", dockerfile = "src/my_agent/Dockerfile.my-agent" }
env = { ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY:-}", OPENAI_API_KEY = "${OPENAI_API_KEY:-}", GEMINI_API_KEY = "${GEMINI_API_KEY:?Set GEMINI_API_KEY in .env}", AGENT_LLM = "${AGENT_LLM:-gemini/gemini-2.5-flash}", AGENT_TEMPERATURE = "${AGENT_TEMPERATURE:-0.0}", AGENT_REASONING_EFFORT = "${AGENT_REASONING_EFFORT:-}", AGENT_PROMPT_VARIANT = "${AGENT_PROMPT_VARIANT:-baseline}", AGENT_SYSTEM_PROMPT_PREFIX = "${AGENT_SYSTEM_PROMPT_PREFIX:-}", AGENT_SYSTEM_PROMPT_SUFFIX = "${AGENT_SYSTEM_PROMPT_SUFFIX:-}", LOGURU_LEVEL = "${LOGURU_LEVEL:-INFO}" }

[config]
num_trials = 3
task_split = "test"
tasks_base_num_tasks = -1
tasks_hallucination_num_tasks = -1
tasks_disambiguation_num_tasks = -1
max_steps = 50
