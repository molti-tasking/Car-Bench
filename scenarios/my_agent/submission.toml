# Official submission scenario for my_agent.
# Before submitting:
#   1. Replace the agent image with your public GHCR image, pinned by DIGEST
#      (docker inspect --format='{{index .RepoDigests 0}}' <image> after push).
#   2. Pick the final AGENT_PROMPT_VARIANT default below.
# Organizers provide evaluator secrets and the values for the agent env vars.

[evaluator]
image = "ghcr.io/car-bench/car-bench-evaluator:latest"

[evaluator.env]
GEMINI_API_KEY = "${GEMINI_API_KEY:?Set GEMINI_API_KEY}"
LOGURU_LEVEL = "${LOGURU_LEVEL:-INFO}"

[agent_under_test]
image = "ghcr.io/yourusername/car-bench-my-agent@sha256:replace_with_digest"

[agent_under_test.env]
AGENT_LLM = "${AGENT_LLM:?Set AGENT_LLM}"
AGENT_API_KEY = "${AGENT_API_KEY:?Set AGENT_API_KEY}"
AGENT_API_BASE = "${AGENT_API_BASE:-}"
AGENT_TEMPERATURE = "${AGENT_TEMPERATURE:-0.0}"
AGENT_REASONING_EFFORT = "${AGENT_REASONING_EFFORT:-}"
AGENT_PROMPT_VARIANT = "${AGENT_PROMPT_VARIANT:-baseline}"
AGENT_SYSTEM_PROMPT_PREFIX = "${AGENT_SYSTEM_PROMPT_PREFIX:-}"
AGENT_SYSTEM_PROMPT_SUFFIX = "${AGENT_SYSTEM_PROMPT_SUFFIX:-}"
LOGURU_LEVEL = "${LOGURU_LEVEL:-INFO}"

[config]
num_trials = 3
task_split = "hidden"
tasks_base_num_tasks = -1
tasks_hallucination_num_tasks = -1
tasks_disambiguation_num_tasks = -1
max_steps = 50
