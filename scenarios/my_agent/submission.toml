# Official submission scenario for my_agent.
# Image published 2026-07-19 from main@aece15a (workflow run 29705053824),
# digest-pinned below. Config: v4_german + self-check — validated public-test
# Pass^3 71.3% / Pass@3 89.3%. The language ablation (v4_english, v4_spanish)
# tied or trailed on matched test tasks; defaults stay on the champion.
# Organizers provide evaluator secrets and the values for the agent env vars.

[evaluator]
image = "ghcr.io/car-bench/car-bench-evaluator:latest"

[evaluator.env]
GEMINI_API_KEY = "${GEMINI_API_KEY:?Set GEMINI_API_KEY}"
LOGURU_LEVEL = "${LOGURU_LEVEL:-INFO}"

[agent_under_test]
image = "ghcr.io/molti-tasking/car-bench-my-agent@sha256:7fed0983ad69050dd7d53ae2dbfa63e255f8f995f98262d73b98b153fd8f3d03"

[agent_under_test.env]
AGENT_LLM = "${AGENT_LLM:?Set AGENT_LLM}"
AGENT_API_KEY = "${AGENT_API_KEY:?Set AGENT_API_KEY}"
AGENT_API_BASE = "${AGENT_API_BASE:-}"
AGENT_TEMPERATURE = "${AGENT_TEMPERATURE:-0.0}"
AGENT_REASONING_EFFORT = "${AGENT_REASONING_EFFORT:-}"
AGENT_PROMPT_VARIANT = "${AGENT_PROMPT_VARIANT:-v4_german}"
AGENT_SELF_CHECK = "${AGENT_SELF_CHECK:-true}"
AGENT_SELF_CHECK_MODEL = "${AGENT_SELF_CHECK_MODEL:-}"
AGENT_ASK_GATE = "${AGENT_ASK_GATE:-false}"
AGENT_LLM_TIMEOUT = "${AGENT_LLM_TIMEOUT:-300}"
AGENT_SYSTEM_PROMPT_PREFIX = "${AGENT_SYSTEM_PROMPT_PREFIX:-}"
AGENT_SYSTEM_PROMPT_SUFFIX = "${AGENT_SYSTEM_PROMPT_SUFFIX:-}"
LOGURU_LEVEL = "${LOGURU_LEVEL:-INFO}"

[config]
num_trials = 3
task_split = "hidden"
tasks_base_num_tasks = -1
tasks_hallucination_num_tasks = -1
tasks_disambiguation_num_tasks = -1
max_steps = 50
