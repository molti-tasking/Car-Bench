# GHCR smoke: validates the PUBLISHED submission image (README Option C).
# Identical to local_docker_smoke.toml except the agent runs from the public,
# digest-pinned GHCR image instead of a local build — so a pass proves the
# exact submitted bytes pull anonymously and answer episodes end-to-end
# against the official evaluator image. Generate with:
#   uv run python generate_compose.py --scenario scenarios/my_agent/ghcr_smoke.toml

[evaluator]
image = "ghcr.io/car-bench/car-bench-evaluator:latest"
env = { LITELLM_PROXY_API_KEY = "${LITE_LLM_API_KEY:?Set LITE_LLM_API_KEY in .env}", LITELLM_PROXY_API_BASE = "${LITE_LLM_API_BASE:?Set LITE_LLM_API_BASE in .env}", LOGURU_LEVEL = "${LOGURU_LEVEL:-INFO}" }

[agent_under_test]
image = "ghcr.io/molti-tasking/car-bench-my-agent@sha256:7fed0983ad69050dd7d53ae2dbfa63e255f8f995f98262d73b98b153fd8f3d03"
env = { LITE_LLM_API_KEY = "${LITE_LLM_API_KEY:?Set LITE_LLM_API_KEY in .env}", LITE_LLM_API_BASE = "${LITE_LLM_API_BASE:?Set LITE_LLM_API_BASE in .env}", AGENT_LLM = "${AGENT_LLM:-litellm_proxy/natai/glm}", AGENT_PROMPT_VARIANT = "${AGENT_PROMPT_VARIANT:-v4_german}", AGENT_SELF_CHECK = "${AGENT_SELF_CHECK:-true}", AGENT_TEMPERATURE = "${AGENT_TEMPERATURE:-0.0}", AGENT_LLM_TIMEOUT = "${AGENT_LLM_TIMEOUT:-300}", LOGURU_LEVEL = "${LOGURU_LEVEL:-INFO}" }

[config]
num_trials = 1
task_split = "train"
tasks_base_num_tasks = 1
tasks_hallucination_num_tasks = 1
tasks_disambiguation_num_tasks = 1
max_steps = 50
user_model = "litellm_proxy/natai/glm"
user_provider = "litellm_proxy"
user_thinking = false
policy_evaluator_model = "litellm_proxy/natai/kimi-k2.5"
policy_evaluator_provider = "litellm_proxy"
