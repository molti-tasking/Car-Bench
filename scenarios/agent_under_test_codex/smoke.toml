[evaluator]
endpoint = "http://127.0.0.1:8081"
cmd = "python src/evaluator/server.py --host 127.0.0.1 --port 8081"

[agent_under_test]
endpoint = "http://127.0.0.1:8080"
# The Codex agent reads CODEX_MODEL from .env. Use gpt-5.3-codex-spark for
# time-budgeted smoke runs, or add "--model <model-id>" here to override it.
cmd = "python src/agent_under_test_codex/server.py --host 127.0.0.1 --port 8080"

[config]
num_trials = 1
task_split = "test"
tasks_base_num_tasks = 3
tasks_hallucination_num_tasks = 0
tasks_disambiguation_num_tasks = 0
