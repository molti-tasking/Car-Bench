name: Evaluate agent variants

# Runs one benchmark evaluation per agent variant in parallel, then merges the
# results into the improvement console and publishes it to GitHub Pages.
#
# Manual trigger (Actions -> Evaluate agent variants -> Run workflow).
#
# Required repository secrets:
#   LITE_LLM_API_KEY, LITE_LLM_API_BASE   self-hosted proxy credentials
# Optional:
#   LANGFUSE_PUBLIC_KEY, LANGFUSE_SECRET_KEY, LANGFUSE_HOST
#
# NOTE: GitHub-hosted runners cap a job at 6h and must be able to reach the
# LiteLLM proxy over the public internet. Full-test-split runs (~6h) need a
# self-hosted runner — set the `runner` input to your runner's label.

on:
  workflow_dispatch:
    inputs:
      variants:
        description: "Comma-separated prompt variants"
        default: "baseline,v4_german"
      split:
        description: "Task split"
        default: "train"
        type: choice
        options: ["train", "test"]
      tasks:
        # 15/category = 45 tasks, so one task is ~2.2pp. At 5/category a single
        # task swings the score 6.7pp, which is wider than any effect measured
        # in this campaign so far.
        description: "Tasks per category (-1 = whole split; below 15 cannot resolve a real effect)"
        default: "15"
      trials:
        # trials=1 yields Pass^1 only. Pass^3 — the competition metric, and the
        # one the harness is designed around — needs 3.
        description: "Trials per task (3 needed for Pass^3; 1 measures Pass^1 only)"
        default: "3"
      self_check:
        description: "Enable the self-check harness"
        default: true
        type: boolean
      firewall:
        description: "Enable the deterministic action firewall"
        default: false
        type: boolean
      firewall_checks:
        description: "Ablate the firewall: subset of precondition,default,provenance (blank = all)"
        default: ""
      schema_guard:
        description: "Enable the deterministic tool-call schema guard"
        default: false
        type: boolean
      ask_gate:
        description: "Preference-lookup gate before clarifying questions"
        default: "off"
        type: choice
        options: ["off", "v1", "v2"]
      runner:
        description: "Runner label (ubuntu-latest, or your self-hosted label)"
        default: "ubuntu-latest"
      agent_llm:
        description: "LiteLLM model string for the agent under test"
        default: "litellm_proxy/natai/glm"
      shards:
        description: "Parallel evaluator+agent pairs (~N x faster; proxy-bound)"
        default: "1"
      probe:
        description: "List the proxy's available models instead of evaluating"
        default: false
        type: boolean

permissions:
  contents: read

# Ref-scoped so runs dispatched from a side branch (e.g. a runner smoke test)
# never queue behind — or cancel — evaluations dispatched from main.
concurrency:
  group: car-bench-eval-${{ github.ref }}
  cancel-in-progress: false

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      variants: ${{ steps.build.outputs.variants }}
    steps:
      - id: build
        run: |
          python3 -c "
          import json, os
          raw = os.environ['VARIANTS']
          items = [v.strip() for v in raw.split(',') if v.strip()]
          print('variants=' + json.dumps(items))
          " >> "$GITHUB_OUTPUT"
        env:
          VARIANTS: ${{ inputs.variants }}

  evaluate:
    needs: matrix
    runs-on: ${{ inputs.runner }}
    # Hosted runners die at 6h regardless, so cap just below it there. On
    # self-hosted runners there is no platform ceiling — a full-test run under
    # proxy contention has already been killed at 350 min once; give it a day.
    timeout-minutes: ${{ inputs.runner == 'ubuntu-latest' && 350 || 1440 }}
    strategy:
      fail-fast: false     # one variant failing must not kill the rest
      matrix:
        variant: ${{ fromJson(needs.matrix.outputs.variants) }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Clone CAR-bench evaluator
        run: ./scripts/setup_car_bench.sh

      - name: Install dependencies
        run: uv sync --extra track-1-agent --extra car-bench-evaluator

      - name: Run evaluation
        env:
          LITE_LLM_API_KEY: ${{ secrets.LITE_LLM_API_KEY }}
          LITE_LLM_API_BASE: ${{ secrets.LITE_LLM_API_BASE }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
          AGENT_LLM: ${{ inputs.agent_llm }}
          # Benchmark fixtures run on the same self-hosted proxy
          USER_SIM_MODEL: litellm_proxy/natai/glm
          USER_SIM_THINKING: "false"
          POLICY_EVAL_MODEL: litellm_proxy/natai/kimi-k2.5
          JUDGE_MODEL: litellm_proxy/natai/kimi-k2.5
          # Dispatch inputs reach the shell as env vars, never interpolated
          # into the script body.
          VARIANT: ${{ matrix.variant }}
          SPLIT: ${{ inputs.split }}
          TASKS: ${{ inputs.tasks }}
          TRIALS: ${{ inputs.trials }}
          SELF_CHECK: ${{ inputs.self_check }}
          FIREWALL: ${{ inputs.firewall }}
          FIREWALL_CHECKS: ${{ inputs.firewall_checks }}
          SCHEMA_GUARD: ${{ inputs.schema_guard }}
          SHARDS: ${{ inputs.shards }}
          PROBE: ${{ inputs.probe }}
          ASK_GATE: ${{ inputs.ask_gate }}
        run: |
          set -euo pipefail
          if [ "$PROBE" = "true" ]; then
            echo "[probe] models served by the LiteLLM proxy:"
            curl -sS -m 20 -H "Authorization: Bearer $LITE_LLM_API_KEY" \
              "$LITE_LLM_API_BASE/v1/models" | python3 -c "
          import json, sys
          from collections import Counter
          ids = sorted(m.get('id') or '' for m in json.load(sys.stdin).get('data', []))
          passthrough = Counter(i.split('/', 1)[0] for i in ids if i.split('/', 1)[0] in
                                ('openai', 'anthropic', 'gemini', 'mistral', 'gemini-pro-latest'))
          for i in ids:
              if i.split('/', 1)[0] not in ('openai', 'anthropic', 'gemini', 'mistral') and not i.startswith('gemini'):
                  print(' -', i)
          for p, n in sorted(passthrough.items()):
              print(f' - {p}/* ({n} passthrough models)')
          "
            exit 0
          fi
          ARGS=(--variant "$VARIANT" --split "$SPLIT" --trials "$TRIALS")
          if [ "$TASKS" = "-1" ]; then ARGS+=(--full); else ARGS+=(--tasks "$TASKS"); fi
          if [ "$SHARDS" != "1" ] && [ -n "$SHARDS" ]; then ARGS+=(--shards "$SHARDS"); fi
          if [ "$SELF_CHECK" = "true" ]; then ARGS+=(--self-check); fi
          if [ "$FIREWALL" = "true" ]; then ARGS+=(--firewall); fi
          if [ "$SCHEMA_GUARD" = "true" ]; then ARGS+=(--schema-guard); fi
          if [ "$ASK_GATE" = "v1" ]; then ARGS+=(--ask-gate); fi
          if [ "$ASK_GATE" = "v2" ]; then ARGS+=(--ask-gate-v2); fi
          if [ -n "$FIREWALL_CHECKS" ]; then ARGS+=(--firewall-checks "$FIREWALL_CHECKS"); fi
          echo "[ci] experiment.py run ${ARGS[*]}"
          uv run python tools/experiment.py run "${ARGS[@]}"

      - name: Collect results
        if: always()
        run: |
          mkdir -p out/raw
          cp experiments/raw/*.json out/raw/ 2>/dev/null || true
          # only this job's registry line(s) — the publish job merges them
          cp experiments/runs.jsonl out/runs.jsonl 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-${{ matrix.variant }}
          path: out/
          retention-days: 30

  publish:
    needs: evaluate
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write     # the registry is committed back, not just archived
      actions: read       # pulls prior runs' raw artifacts for the rescue waffle
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history: the improvement console labels each code state with
          # its commit subject via `git log`; a shallow clone renders every
          # entry as "uncommitted edits".
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: incoming
          pattern: results-*
          merge-multiple: false

      - name: Merge results into the registry and commit it back
        # workflow_dispatch inputs reach the shell as env vars, never as
        # ${{ }} interpolation into the script body.
        env:
          VARIANTS: ${{ inputs.variants }}
        run: |
          set -euo pipefail
          mkdir -p experiments/raw
          # Raw payloads stay artifact-only: experiments/raw/ is gitignored and
          # a full-split round is tens of MB.
          find incoming -path '*/raw/*.json' -exec cp {} experiments/raw/ \; 2>/dev/null || true

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # runs.jsonl is append-only and both sides append, so a rebase would
          # conflict on essentially every new line. Instead rebuild the file
          # from the freshest remote state on each attempt and re-merge, which
          # is conflict-free by construction and idempotent (dedup by run_id).
          merge_onto_remote() {
            git checkout "origin/${BRANCH}" -- experiments/runs.jsonl 2>/dev/null || true
            find incoming -name 'runs.jsonl' -exec cat {} \; >> experiments/runs.jsonl 2>/dev/null || true
            python3 - <<'PY'
          import json, pathlib
          p = pathlib.Path('experiments/runs.jsonl')
          seen, out = set(), []
          for line in p.read_text().splitlines():
              if not line.strip():
                  continue
              rec = json.loads(line)
              if rec['run_id'] in seen:   # artifact lines duplicate committed history
                  continue
              seen.add(rec['run_id'])
              out.append(line)
          p.write_text('\n'.join(out) + '\n')
          print(f'{len(out)} unique runs in the registry')
          PY
          }

          BRANCH="${GITHUB_REF_NAME}"
          for attempt in 1 2 3; do
            git fetch --quiet origin "${BRANCH}"
            merge_onto_remote
            git add experiments/runs.jsonl
            if git diff --cached --quiet; then
              echo "no new runs to record"
              exit 0
            fi
            git commit --quiet -m "chore(ci): record run(s) from ${GITHUB_RUN_ID}" \
                                -m "Workflow: ${GITHUB_WORKFLOW} · variants: ${VARIANTS}"
            if git push --quiet origin "HEAD:${BRANCH}"; then
              echo "registry pushed to ${BRANCH}"
              exit 0
            fi
            echo "push rejected (attempt ${attempt}/3) — rebuilding on the new remote head"
            git reset --hard --quiet "origin/${BRANCH}"   # untracked incoming/ survives
            sleep 5
          done
          echo "::error::could not push the registry after 3 attempts. Results are still \
          in the artifacts; check branch protection on ${BRANCH}."
          exit 1

      - name: Fetch prior raw payloads for cross-run sections
        # The rescue waffle and simulator audit need per-task trajectories
        # from *previous* runs' artifacts (raw payloads are gitignored).
        # Best effort: a miss just drops those sections, never fails the build.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail
          mkdir -p experiments/raw
          gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts?per_page=100" \
            --jq '.artifacts[] | select(.name | startswith("results-")) | select(.expired | not) | .id' \
            | head -30 | while read -r aid; do
              gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/${aid}/zip" > /tmp/a.zip 2>/dev/null \
                && unzip -o -q /tmp/a.zip 'raw/*' -d /tmp/adir 2>/dev/null || true
            done
          cp /tmp/adir/raw/*.json experiments/raw/ 2>/dev/null || true
          ls experiments/raw/ | head -20 || true

      - name: Build the improvement console
        env:
          # Header metadata only — must mirror the evaluate job's fixture
          # models, or the console renders "user-sim gemini-2.5-flash · judges ?".
          USER_SIM_MODEL: litellm_proxy/natai/glm
          JUDGE_MODEL: litellm_proxy/natai/kimi-k2.5
        run: |
          set -euo pipefail
          # Deliberately NOT `uv sync`: the lockfile declares car-bench as a
          # path source (third_party/car-bench), which is gitignored and only
          # materialises after scripts/setup_car_bench.sh. uv validates that
          # source regardless of which --extra is selected, so a sync here
          # fails even though the dashboard never touches the benchmark. Its
          # only third-party import is python-dotenv.
          python3 -m pip install --quiet python-dotenv
          python3 tools/dashboard.py
          mkdir -p site
          cp experiments/dashboard.html site/index.html

      # GitHub Pages needs a public repo (or a paid plan), so the console ships
      # as a downloadable artifact instead. Actions → run → Artifacts →
      # "improvement-console" → unzip → open index.html.
      - uses: actions/upload-artifact@v4
        with:
          name: improvement-console
          path: site/
          retention-days: 30
